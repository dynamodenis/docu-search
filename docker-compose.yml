# Local dev orchestrator. Qdrant lives in Qdrant Cloud — pointed at via
# QDRANT_URL in .env — so we do not run it here.
#
# Usage:
#     docker compose up --build
#     # frontend → http://localhost:8501
#     # backend  → http://localhost:8000

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      # Allow the in-compose frontend container to call us.
      CORS_ORIGINS: http://localhost:8501,http://127.0.0.1:8501,http://frontend:8501
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    environment:
      # Inside the compose network the backend is reachable by service name.
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped
